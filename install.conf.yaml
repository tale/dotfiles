- defaults:
    link:
        create: true
        relink: true

- clean: ['~']

- link:
    ~/.zshrc: zshrc
    ~/.config/nvim/init.vim: init.vim
    ~/.gitconfig: git/git.config
    ~/.gitignore: git/git.ignore
    ~/.git/darwin.gitconfig: git/darwin.gitconfig
    ~/.git/linux.gitconfig: git/linux.config

- create:
    - ~/.hushlogin

- shell:
  - ['git clone https://github.com/tarjoilija/zgen.git ${HOME}/.zgen', Cloning Dotbot]
  - [git submodule update --init --recursive, Installing submodules]