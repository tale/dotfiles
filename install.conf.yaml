- defaults:
    link:
        create: true
        relink: true

- clean: ['~']

- link:
    ~/.zshrc: zshrc
    ~/.config/nvim/init.vim: init.vim
    ~/.gitconfig: git/git.config
    ~/.gitignore: git/git.ignore
    ~/.git/darwin.gitconfig: git/darwin.config
    ~/.git/linux.gitconfig: git/linux.config
    ~/.nvm/default-packages: nvm/default-packages

- create:
    - ~/.hushlogin

- shell:
  - [git clone https://github.com/tarjoilija/zgen.git ~/.zgen, Cloning ZGen]
  - [git submodule update --init --recursive, Installing submodules]